<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polt Mobilier - Calculadora + Google Sheets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1d1d1d 0%, #2d2d2d 100%);
            color: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-size: 36px; font-weight: 700; margin-bottom: 8px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { color: #999; font-size: 16px; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .card {
            background: rgba(45, 45, 45, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
        }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }

        .input-group { margin-bottom: 16px; }
        .input-group label {
            display: block; font-size: 12px; color: #aaa; margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
        }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; padding: 10px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 6px;
            color: #f5f5f5; font-size: 14px;
        }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            outline: none; border-color: #60a5fa; background: rgba(0, 0, 0, 0.6);
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .preset-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .preset-btn {
            padding: 10px; background: rgba(96, 165, 250, 0.15); border: 1px solid rgba(96, 165, 250, 0.3);
            color: #60a5fa; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
            transition: all 0.2s;
        }
        .preset-btn:hover { background: rgba(96, 165, 250, 0.25); }
        .preset-btn.active { background: rgba(96, 165, 250, 0.5); color: white; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .btn {
            padding: 12px; border: none; border-radius: 8px; font-size: 13px;
            font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(96, 165, 250, 0.3); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #60a5fa; }
        .btn-secondary:hover { background: rgba(96, 165, 250, 0.1); }

        .btn-save {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white; grid-column: span 2; font-size: 14px; padding: 14px;
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(245, 158, 11, 0.4); }

        .analysis-section { display: none; }
        .analysis-section.active { display: block; }

        .components-table {
            width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 12px;
        }
        .components-table thead { background: rgba(0, 0, 0, 0.3); border-bottom: 2px solid rgba(255, 255, 255, 0.1); }
        .components-table th, .components-table td { padding: 10px; text-align: left; color: #f5f5f5; }
        .components-table th { color: #60a5fa; font-weight: 600; text-transform: uppercase; font-size: 11px; }
        .components-table tbody tr { border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .result-box {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(96, 165, 250, 0.1));
            border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 8px; padding: 20px; margin: 20px 0;
        }
        .result-value { font-size: 32px; font-weight: 700; color: #10b981; margin: 8px 0; }
        .result-label { color: #aaa; font-size: 12px; text-transform: uppercase; }

        .cost-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
        .alert {
            padding: 12px; border-radius: 6px; margin: 12px 0; font-size: 13px;
        }
        .alert-success { background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4); color: #10b981; }
        .alert-error { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #ef4444; }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .preset-buttons { grid-template-columns: 1fr; }
            .button-group { grid-template-columns: 1fr; }
            .btn-save { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Polt Mobilier - Calculadora</h1>
            <p>Análisis profesional + Guardado automático en Google Sheets</p>
        </div>

        <div class="main-grid">
            <!-- COLUMNA IZQUIERDA -->
            <div class="card">
                <div class="card-title">📋 Carga tu Mueble</div>

                <!-- Presets -->
                <div class="preset-buttons">
                    <button class="preset-btn active" onclick="loadPreset('placard')">Placard</button>
                    <button class="preset-btn" onclick="loadPreset('biblioteca')">Biblioteca</button>
                    <button class="preset-btn" onclick="loadPreset('cocina')">Cocina</button>
                </div>

                <div class="input-group">
                    <label>Tipo de Mueble</label>
                    <select id="tipoMueble" onchange="updateUI()">
                        <option value="placard">Placard / Ropero</option>
                        <option value="biblioteca">Biblioteca / Estantería</option>
                        <option value="cocina">Mueble Cocina</option>
                        <option value="custom">Personalizado</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Dimensiones Generales (cm)</label>
                    <div class="input-row">
                        <input type="number" id="alto" placeholder="Alto" value="240">
                        <input type="number" id="ancho" placeholder="Ancho" value="80">
                        <input type="number" id="profundo" placeholder="Profundo" value="45">
                    </div>
                </div>

                <div class="input-group">
                    <label>Descripción de Componentes</label>
                    <textarea id="componentes" placeholder="Ej: 2 puertas espejo, 3 estantes, 2 cajones" rows="3">2 puertas espejo, 3 estantes, 2 cajones inferiores</textarea>
                </div>

                <div class="input-group">
                    <label>Material Principal</label>
                    <select id="material">
                        <option value="melamina18">Melamina 18mm</option>
                        <option value="melamina25">Melamina 25mm</option>
                        <option value="mdf18">MDF 18mm</option>
                        <option value="mdf25">MDF 25mm</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" onclick="analizar()">🔍 ANALIZAR</button>
                    <button class="btn btn-secondary" onclick="limpiar()">↻ LIMPIAR</button>
                </div>
            </div>

            <!-- COLUMNA DERECHA -->
            <div class="card">
                <div class="card-title">📊 Análisis & Presupuesto</div>

                <div id="sin-analisis" style="text-align: center; padding: 40px 0; color: #999;">
                    <p style="font-size: 14px;">Carga los datos y haz clic en "ANALIZAR"</p>
                </div>

                <div id="con-analisis" class="analysis-section">
                    <!-- Tabla de componentes -->
                    <table id="tablaComponentes" class="components-table"></table>

                    <!-- Resultado Material -->
                    <div class="result-box">
                        <div class="result-label">Material Total Necesario</div>
                        <div class="result-value" id="materialTotal">0 m²</div>
                        <div style="color: #999; font-size: 12px; margin-top: 6px;">
                            Con desperdicio (20%): <strong id="materialConDesperdicio">0 m²</strong>
                        </div>
                    </div>

                    <!-- Inputs de Costo -->
                    <div class="cost-inputs">
                        <div class="input-group">
                            <label>Costo por m²</label>
                            <input type="number" id="costoPorM2" placeholder="Precio" value="3750" step="100">
                        </div>
                        <div class="input-group">
                            <label>Multiplicador (acabados)</label>
                            <input type="number" id="multiplicador" placeholder="1.0" value="1.5" min="1" max="3" step="0.1">
                        </div>
                    </div>

                    <!-- Resultado Presupuesto -->
                    <div class="result-box">
                        <div class="result-label">Presupuesto Final</div>
                        <div class="result-value" id="presupuestoFinal">$0</div>
                        <div style="color: #999; font-size: 12px; margin-top: 6px;">
                            Material: <strong id="costMaterial">$0</strong> + Acabados (<strong id="multiplicadorDisplay">1.5x</strong>)
                        </div>
                    </div>

                    <!-- Botón GUARDAR en Sheets -->
                    <div class="button-group" style="margin-top: 20px;">
                        <button class="btn btn-save" onclick="guardarEnSheets()" style="grid-column: span 2;">
                            💾 GUARDAR EN GOOGLE SHEETS
                        </button>
                    </div>

                    <!-- Alertas -->
                    <div id="alertas"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // WEBHOOK INYECTADO DIRECTAMENTE
        const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbw1_Rly4lstzbyYz_c46v2AVnxooe1CfswUdlI80N2Zr0IfRK6pCDHOnXtxYzlpG4Ozmw/exec';

        const PRESETS = {
            placard: {
                tipoMueble: 'Placard / Ropero',
                alto: 240, ancho: 80, profundo: 45,
                componentes: '2 puertas espejo, 3 estantes, 2 cajones inferiores',
                materialM2: 1.5569
            },
            biblioteca: {
                tipoMueble: 'Biblioteca / Estantería',
                alto: 240, ancho: 100, profundo: 30,
                componentes: '4 estantes fijos, 2 costados, refuerzos',
                materialM2: 2.3904
            },
            cocina: {
                tipoMueble: 'Mueble Cocina',
                alto: 85, ancho: 180, profundo: 60,
                componentes: '1 puerta blanca, 3 cajones, 2 estantes, refuerzos',
                materialM2: 1.5729
            }
        };

        let datosActuales = null;

        function loadPreset(tipo) {
            const preset = PRESETS[tipo];
            document.getElementById('tipoMueble').value = tipo;
            document.getElementById('alto').value = preset.alto;
            document.getElementById('ancho').value = preset.ancho;
            document.getElementById('profundo').value = preset.profundo;
            document.getElementById('componentes').value = preset.componentes;

            // Actualizar visual de botones
            document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function analizar() {
            const tipo = document.getElementById('tipoMueble').value;
            const alto = parseFloat(document.getElementById('alto').value);
            const ancho = parseFloat(document.getElementById('ancho').value);
            const profundo = parseFloat(document.getElementById('profundo').value);
            const componentes = document.getElementById('componentes').value;
            const material = document.getElementById('material').value;

            if (!alto || !ancho || !profundo) {
                alert('Por favor completa las dimensiones');
                return;
            }

            const preset = PRESETS[tipo];
            const materialM2 = preset ? preset.materialM2 : (alto * ancho * profundo) / 10000 * 1.5;

            datosActuales = {
                tipoMueble: document.getElementById('tipoMueble').options[document.getElementById('tipoMueble').selectedIndex].text,
                dimensiones: `${alto} × ${ancho} × ${profundo} cm`,
                material: material,
                materialM2: materialM2.toFixed(4),
                componentes: componentes
            };

            // Mostrar análisis
            document.getElementById('sin-analisis').style.display = 'none';
            document.getElementById('con-analisis').classList.add('active');

            // Tabla de componentes
            const tabla = `
                <thead>
                    <tr>
                        <th>Componente</th>
                        <th>Cantidad</th>
                        <th>Área (m²)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>Laterales</td><td>2</td><td>${(materialM2 * 0.25).toFixed(4)}</td></tr>
                    <tr><td>Techo/Base</td><td>2</td><td>${(materialM2 * 0.20).toFixed(4)}</td></tr>
                    <tr><td>Estantes/Cajones</td><td>5</td><td>${(materialM2 * 0.35).toFixed(4)}</td></tr>
                    <tr><td>Refuerzos/Otros</td><td>-</td><td>${(materialM2 * 0.20).toFixed(4)}</td></tr>
                </tbody>
            `;
            document.getElementById('tablaComponentes').innerHTML = tabla;

            // Actualizaciones
            document.getElementById('materialTotal').textContent = `${materialM2.toFixed(2)} m²`;
            document.getElementById('materialConDesperdicio').textContent = `${(materialM2 * 1.2).toFixed(2)} m²`;

            // Recalcular presupuesto
            actualizarPresupuesto();
        }

        function actualizarPresupuesto() {
            if (!datosActuales) return;

            const costoPorM2 = parseFloat(document.getElementById('costoPorM2').value) || 0;
            const multiplicador = parseFloat(document.getElementById('multiplicador').value) || 1;
            const materialM2 = parseFloat(datosActuales.materialM2);

            const costMaterial = (materialM2 * costoPorM2).toFixed(0);
            const presupuestoFinal = (costMaterial * multiplicador).toFixed(0);

            document.getElementById('costMaterial').textContent = `$${parseInt(costMaterial).toLocaleString('es-AR')}`;
            document.getElementById('multiplicadorDisplay').textContent = `${multiplicador}x`;
            document.getElementById('presupuestoFinal').textContent = `$${parseInt(presupuestoFinal).toLocaleString('es-AR')}`;

            datosActuales.costPerM2 = costoPorM2;
            datosActuales.materialCost = costMaterial;
            datosActuales.multiplier = multiplicador;
            datosActuales.finalPrice = presupuestoFinal;
        }

        function guardarEnSheets() {
            if (!datosActuales) {
                alert('Debes analizar un mueble primero');
                return;
            }

            const alertas = document.getElementById('alertas');
            alertas.innerHTML = '<div class="alert alert-success">⏳ Guardando...</div>';

            fetch(WEBHOOK_URL, {
                method: 'POST',
                body: JSON.stringify(datosActuales)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alertas.innerHTML = `<div class="alert alert-success">✅ ${data.message} Presupuesto guardado en Google Sheets</div>`;
                    setTimeout(() => { alertas.innerHTML = ''; }, 4000);
                } else {
                    alertas.innerHTML = `<div class="alert alert-error">❌ Error: ${data.message}</div>`;
                }
            })
            .catch(err => {
                alertas.innerHTML = `<div class="alert alert-error">❌ Error de conexión. Verifica el webhook URL.</div>`;
                console.error(err);
            });
        }

        function limpiar() {
            document.getElementById('alto').value = 240;
            document.getElementById('ancho').value = 80;
            document.getElementById('profundo').value = 45;
            document.getElementById('componentes').value = '';
            document.getElementById('costoPorM2').value = 3750;
            document.getElementById('multiplicador').value = 1.5;
            document.getElementById('sin-analisis').style.display = 'block';
            document.getElementById('con-analisis').classList.remove('active');
            document.getElementById('alertas').innerHTML = '';
            datosActuales = null;
        }

        // Actualizar presupuesto en tiempo real
        document.getElementById('costoPorM2').addEventListener('input', actualizarPresupuesto);
        document.getElementById('multiplicador').addEventListener('input', actualizarPresupuesto);

        function updateUI() {}
    </script>
</body>
</html>
